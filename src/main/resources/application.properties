spring.application.name=PTUTBack

# H2 pour tests locaux
spring.datasource.url=jdbc:h2:file:./data/ptutdb;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# PostgreSQL - décommenter pour prod
# spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ptut}
# spring.datasource.username=${DB_USER:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# H2 Console pour debug
spring.h2.console.enabled=true

# Swagger / OpenAPI
springdoc.swagger-ui.path=/api
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
spring.h2.console.path=/h2-console
