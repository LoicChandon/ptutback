spring.application.name=PTUTBack

# Optional local override file (do not commit): .env.properties
spring.config.import=optional:file:.env.properties

# PostgreSQL alwaysdata
spring.datasource.url=${DB_URL:jdbc:postgresql://postgresql-loicchandon.alwaysdata.net:5432/loicchandon_bdd_ptutfie3}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USER:env.DB_USER}
spring.datasource.password=${DB_PASSWORD:env.DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.sql.init.mode=never
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=OFF

# Swagger / OpenAPI
springdoc.swagger-ui.path=/api
springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
